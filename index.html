<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giddy Racing V2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#222;
overflow:hidden;
color:white;
text-align:center;
}

#hud{
background:#111;
padding:12px;
display:flex;
justify-content:space-around;
font-weight:bold;
font-size:18px;
}

#game{
position:relative;
width:360px;
height:640px;
margin:10px auto;
background:#555;
overflow:hidden;
border:6px solid white;
}

#road{
position:absolute;
width:100%;
height:100%;
background:#555;
}

.line{
position:absolute;
width:10px;
height:60px;
left:175px;
background:white;
}

#car{
position:absolute;
width:60px;
height:110px;
bottom:20px;
left:150px;
border-radius:12px;
background:linear-gradient(red,darkred);
border:3px solid white;
}

#car:before{
content:"";
position:absolute;
width:36px;
height:30px;
left:12px;
top:10px;
background:#66ccff;
border-radius:8px;
}

.wheel{
position:absolute;
width:10px;
height:25px;
background:black;
border-radius:5px;
}<script>

let score=0;
let coins=0;
let level=1;
let lives=3;

const car=document.getElementById("car");
const game=document.getElementById("game");

const scoreText=document.getElementById("score");
const coinText=document.getElementById("coins");
const levelText=document.getElementById("level");
const livesText=document.getElementById("lives");

let carX=150;
let gameRunning=false;

for(let i=0;i<12;i++){

const line=document.createElement("div");

line.className="line";

line.style.top=(i*70)+"px";

game.appendChild(line);

}

function left(){

if(!gameRunning)return;

carX=Math.max(20,carX-35);

car.style.left=carX+"px";

}

function right(){

if(!gameRunning)return;

carX=Math.min(280,carX+35);

car.style.left=carX+"px";

}

function startGame(){

gameRunning=true;

moveRoad();

spawnEnemy();

}

function moveRoad(){

const lines=document.querySelectorAll(".line");

setInterval(function(){

lines.forEach(function(line){

let y=parseInt(line.style.top);

y+=6+level;

if(y>640)y=-60;

line.style.top=y+"px";
function spawnEnemy(){

const enemy=document.createElement("div");

enemy.className="enemy";

enemy.innerHTML=`
<div class="car-body"></div>
<div class="windshield"></div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
<div class="wheel w3"></div>
<div class="wheel w4"></div>
`;

enemy.style.left=(35+Math.floor(Math.random()*4)*70)+"px";
enemy.style.top="-130px";

game.appendChild(enemy);

let y=-130;

const move=setInterval(function(){

if(!gameRunning){
clearInterval(move);
return;
}

y+=5+level;

enemy.style.top=y+"px";

const carRect=car.getBoundingClientRect();
const enemyRect=enemy.getBoundingClientRect();

if(
carRect.left<enemyRect.right &&
carRect.right>enemyRect.left &&
carRect.top<enemyRect.bottom &&
carRect.bottom>enemyRect.top
){

lives--;

livesText.innerHTML=lives;

enemy.remove();

clearInterval(move);

if(lives<=0){

alert("💥 Game Over!\nScore: "+score);

location.reload();

}else{

spawnEnemy();

}

return;

}

if(y>700){

enemy.remove();

clearInterval(move);

score+=10;
coins+=5;

scoreText.innerHTML=score;
coinText.innerHTML=coins;

if(score%100===0){

level++;

levelText.innerHTML=level;

alert("🏁 Level "+level+"!");

}

spawnEnemy();

}</script>

</body>
</html>

},30);

  }
});

},30);

  }
