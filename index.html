<!DOCTYPE html>
<html>
<head>
<title>Giddy Puzzle</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
background:#1e88e5;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}
button{
padding:15px;
font-size:20px;
margin:10px;
}
</style>
</head>
<body>

<h1>🧩 Giddy Puzzle</h1>

<p>Find the hidden number!</p>

<button onclick="play()">Play</button>

<p id="result"></p>

<script>
function play(){
let answer=Math.floor(Math.random()*10)+1;
let guess=prompt("Guess a number from 1 to 10");

if(Number(guess)===answer){
document.getElementById("result").innerHTML=
"🎉 Correct!";
}else{
document.getElementById("result").innerHTML=
"Try again! Number was "+answer;
}
}
</script>

</body>
</html>
