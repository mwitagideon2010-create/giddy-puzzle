<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giddy Racing</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#1e88e5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#game{
position:relative;
width:350px;
height:600px;
background:#444;
overflow:hidden;
border:5px solid white;
border-radius:10px;
}

#road{
position:absolute;
width:100%;
height:100%;
background:#555;
}

.line{
position:absolute;
left:50%;
width:10px;
height:60px;
background:white;
transform:translateX(-50%);
}

#player{
position:absolute;
bottom:20px;
left:145px;
width:60px;
height:100px;
background:red;
border-radius:10px;
}

.enemy{
position:absolute;
width:60px;
height:100px;
background:yellow;
border-radius:10px;
}

.coin{
position:absolute;
width:25px;
height:25px;
background:gold;
border-radius:50%;
}

#scoreBoard{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
font-weight:bold;
z-index:100;
}
</style>
</head>

<body>

<div id="game">

<div id="road"></div>

<div id="scoreBoard">
Score: <span id="score">0</span><br>
Coins: <span id="coins">0</span>
</div>

<div id="player"></div>

</div>

<script>

let score=0;
let coins=0;

const game=document.getElementById("game");
const player=document.getElementById("player");

for(let i=0;i<10;i++){

let line=document.createElement("div");

line.className="line";

line.style.top=(i*80)+"px";

game.appendChild(line);

}

</script>

</body>
</html>
